<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Миле Сонечко ☀️</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Более мягкий, "йогуртовый" градиент */
      background: linear-gradient(180deg, #b3e5fc 0%, #fff9c4 100%);
      font-family: "Comic Sans MS", "Segoe UI", cursive, sans-serif; /* Более игривый шрифт */
      overflow: hidden;
    }

    .sun-wrapper {
      position: relative;
      width: 320px;
      height: 320px;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Небольшое покачивание всего солнца */
      animation: floating 4s ease-in-out infinite;
    }

    @keyframes floating {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .sun {
      position: relative;
      z-index: 2;
      width: 150px;
      height: 150px;
      background: #fff176; /* Более нежный желтый */
      border-radius: 50%;
      border: 8px solid #ffb74d; /* Утолщенная, мягкая обводка */
      /* Мягкое, "сахарное" свечение */
      box-shadow: 0 0 40px rgba(255, 235, 59, 0.7);
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      
      /* Центрирование личика внутри */
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden; /* Чтобы румяна не вылезали */
    }

    .sun:hover {
      transform: scale(1.1) rotate(5deg);
    }

    /* --- Милое личико --- */
    .face {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* Глазки */
    .eye {
      position: absolute;
      top: 40%;
      width: 16px;
      height: 22px;
      background: #5d4037; /* Темно-коричневый вместо черного (мягче) */
      border-radius: 50%;
      animation: blink 4s infinite;
    }
    
    .eye.left { left: 25%; }
    .eye.right { right: 25%; }

    /* Блик в глазу */
    .eye::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
    }

    /* Анимация моргания */
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }

    /* Улыбка */
    .mouth {
      position: absolute;
      top: 60%;
      left: 50%;
      width: 40px;
      height: 20px;
      border: 6px solid #5d4037;
      border-radius: 0 0 50px 50px; /* Скругление снизу */
      border-top: 0; /* Убираем верхнюю линию */
      transform: translateX(-50%);
    }

    /* Румяна */
    .blush {
      position: absolute;
      top: 55%;
      width: 25px;
      height: 15px;
      background: rgba(255, 138, 128, 0.6);
      border-radius: 50%;
      filter: blur(2px);
    }
    .blush.left { left: 10%; }
    .blush.right { right: 10%; }


    /* --- Обновленные милые лучи --- */
    .ray {
      position: absolute;
      z-index: 1;
      width: 12px; /* Пошире */
      height: 260px; /* Общий размах */
      background: transparent;
      top: 50%;
      left: 50%;
      margin-top: -130px;
      margin-left: -6px;
    }

    .ray::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50px; /* Видимая часть */
      background: #ffee58;
      border: 4px solid #5d4037; /* Коричневый мягкий контур */
      border-radius: 10px; /* Очень круглые края */
    }

    /* --- Милый Попап --- */
    .popup {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) scale(0.5);
      background: #fff;
      padding: 30px;
      border-radius: 30px; /* Сильное скругление */
      /* Розовая тень */
      box-shadow: 0 15px 40px rgba(255, 128, 171, 0.3);
      width: 90%;
      max-width: 380px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      /* Желейная анимация появления */
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 10;
      border: 5px solid #ff80ab; /* Розовая обводка */
    }

    .popup.active {
      opacity: 1;
      transform: translateX(-50%) scale(1);
      pointer-events: auto;
    }

    .popup h2 {
      margin: 0 0 15px;
      font-size: 26px;
      color: #ec407a; /* Розовый заголовок */
    }

    .popup p {
      font-size: 18px;
      line-height: 1.6;
      margin: 0;
      color: #5d4037;
    }

    /* Кнопка "мяу" */
    .close {
      margin-top: 25px;
      padding: 15px 30px;
      border: none;
      border-radius: 20px;
      background: #ff80ab;
      font-weight: bold;
      font-size: 16px;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 0 #f48fb1; /* Псевдо-3D эффект */
    }

    .close:hover {
      background: #f48fb1;
      transform: translateY(-2px);
    }
    
    .close:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #f48fb1;
    }
  </style>
</head>
<body>

<div class="sun-wrapper" id="wrapper">
  <div class="sun" onclick="showMessage()">
    <div class="face">
      <div class="blush left"></div>
      <div class="blush right"></div>
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="mouth"></div>
    </div>
  </div>
</div>

<div class="popup" id="popup">
  <h2>Привіт, сонечко! 🌸</h2>
  <p>
    Ти просто чудо! ✨<br>
    Нехай цей день буде теплим і спокійним 💛<br>
    Гарного настрою тобі ✨
  </p>
  <button class="close" onclick="hideMessage()">Зрозуміло! 🥰</button>
</div>

<script>
  const wrapper = document.getElementById('wrapper');
  // Чуть меньше лучей, чтобы не перегружать
  const raysCount = 10; 

  for (let i = 0; i < raysCount; i++) {
    const ray = document.createElement('div');
    ray.className = 'ray';
    ray.style.transform = `rotate(${i * (360 / raysCount)}deg)`;
    wrapper.appendChild(ray);
  }

  function showMessage() {
    document.getElementById('popup').classList.add('active');
  }

  function hideMessage() {
    document.getElementById('popup').classList.remove('active');
  }
</script>

</body>
</html>

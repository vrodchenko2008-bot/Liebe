<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сонечко ☀️</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #8FB3C1 0%, #D6D2A8 100%);
      font-family: "Segoe UI", Arial, sans-serif;
      overflow: hidden;
    }

    .sun-wrapper {
      position: relative;
      width: 300px; /* Трохи збільшив контейнер для променів */
      height: 300px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .sun {
      position: relative;
      z-index: 2; /* Щоб сонце було над променями */
      width: 140px;
      height: 140px;
      background: #FFEB3B;
      border-radius: 50%;
      border: 5px solid #FFA000;
      box-shadow: 0 0 50px rgba(255, 200, 0, 0.8);
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .sun:hover {
      transform: scale(1.05);
    }

    /* Виправлені промені */
    .ray {
      position: absolute;
      z-index: 1; /* Під сонечком */
      width: 6px;
      height: 220px; /* Довжина "розмаху" променів */
      background: transparent;
      top: 50%;
      left: 50%;
      /* Центруємо промінь по середині і крутимо навколо центру */
      margin-top: -110px; 
      margin-left: -3px;
    }

    /* Сама видима частина променя */
    .ray::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 40px; /* Довжина видимого відрізка */
      background: #FFEB3B;
      border: 1.5px solid black; /* Чорний контур як на фото */
      border-radius: 2px;
    }

    /* Попап */
    .popup {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      background: white;
      padding: 25px;
      border-radius: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      width: 90%;
      max-width: 350px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 10;
    }

    .popup.active {
      opacity: 1;
      transform: translateX(-50%) scale(1);
      pointer-events: auto;
    }

    .popup h2 {
      margin: 0 0 12px;
      font-size: 24px;
      color: #F57C00;
    }

    .popup p {
      font-size: 18px;
      line-height: 1.5;
      margin: 0;
      color: #444;
    }

    .close {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 15px;
      background: #FFD700;
      font-weight: bold;
      color: #5D4037;
      cursor: pointer;
      transition: background 0.2s;
    }

    .close:hover {
      background: #FFC107;
    }
  </style>
</head>
<body>

<div class="sun-wrapper" id="wrapper">
  <div class="sun" onclick="showMessage()"></div>
</div>

<div class="popup" id="popup">
  <h2>Доброго ранку ☀️</h2>
  <p>
    Нехай цей день буде теплим і спокійним 💛<br>
    Гарного настрою тобі на весь день ✨
  </p>
  <button class="close" onclick="hideMessage()">Закрити</button>
</div>

<script>
  const wrapper = document.getElementById('wrapper');
  const raysCount = 12; // Кількість променів

  for (let i = 0; i < raysCount; i++) {
    const ray = document.createElement('div');
    ray.className = 'ray';
    // Рівномірно розподіляємо по колу
    ray.style.transform = `rotate(${i * (360 / raysCount)}deg)`;
    wrapper.appendChild(ray);
  }

  function showMessage() {
    document.getElementById('popup').classList.add('active');
  }

  function hideMessage() {
    document.getElementById('popup').classList.remove('active');
  }
</script>

</body>
</html>
